<!DOCTYPE html>
<html>
<head>
  <title>Fetch Users</title>
</head>
<body>
  <h1>Problem 6 (Level 3)</h1>
  <p>Skill focus: async JavaScript and API handling.</p>
  <p>Load users from an API and render them as a list.</p>

  <p id="status">Loading users...</p>
  <ul id="user-list"></ul>

  <script>
    const status = document.getElementById('status');
    const userList = document.getElementById('user-list');

    async function loadUsers() {
      const response = await fetch('https://jsonplaceholder.typicode.com/users');

      if (!response.ok) {
        throw new Error('Request failed');
      }

      const users = response.json();
      status.textContent = '';

      users.forEach((user) => {
        const li = document.createElement('li');
        li.textContent = user.name;
        userList.appendChild(li);
      });
    }

    loadUsers;
  </script>

  <p>Fix the bugs, add loading/error states, and keep the UI responsive while data loads.</p>
</body>
</html>
